<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRW | Obras Generativas</title>
    <link rel="stylesheet" href="estilos.css">
    <!-- Incluir p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Barra de navegación -->
    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="#portfolio">Portfolio</a>
        <a href="talleres.html">Talleres</a>
        <a href="#contact">Contacto</a>
    </nav>

    <!-- Contenido principal -->
    <div class="content">
        
        <!-- Sección Portfolio -->
        <section id="portfolio">
            <h1>Obras Generativas</h1>
            <h2>Exploraciones algorítmicas en p5.js</h2>
            
            <!-- Grid de obras -->
            <div class="art-grid">

                <!-- Obra 1 -->
                <div class="artwork-item">
                    <div id="obra-1" class="p5-sketch"></div>
                    <div class="artwork-info">
                        <h3>Geometrías Dinámicas</h3>
                        <p>Generación procedural de formas en tiempo real</p>
                        <a href="https://github.com/tu-usuario/geometrias-dinamicas" target="_blank" class="code-link">Ver código</a>
                    </div>
                </div>

                <!-- Obra 2 -->
                <div class="artwork-item">
                    <div id="obra-2" class="p5-sketch"></div>
                    <div class="artwork-info">
                        <h3>Flujos Vectoriales</h3>
                        <p>Simulación de partículas con campos de fuerza</p>
                        <a href="https://github.com/tu-usuario/flujos-vectoriales" target="_blank" class="code-link">Ver código</a>
                    </div>
                </div>

                <!-- Añadir más obras según sea necesario -->
                
            </div>
        </section>

    </div>

    <!-- Scripts de las obras -->
    <script>
        // Sketch 1 - Geometrías Dinámicas
        new p5(p => {
            p.setup = () => {
                const canvas = p.createCanvas(500, 500);
                canvas.parent('obra-1');
                p.noStroke();
            };

            p.draw = () => {
                p.background(10, 10, 30);
                for(let i = 0; i < 50; i++) {
                    p.fill(p.map(i, 0, 50, 0, 255), 150, 200);
                    p.ellipse(
                        p.width/2 + p.sin(p.frameCount * 0.01 + i) * 200,
                        p.height/2 + p.cos(p.frameCount * 0.015 + i) * 200,
                        p.sin(p.frameCount * 0.02 + i) * 30 + 40
                    );
                }
            };
        }, 'obra-1');

        // Sketch 2 - Flujos Vectoriales
        new p5(p => {
            let particles = [];
            
            p.setup = () => {
                const canvas = p.createCanvas(500, 500);
                canvas.parent('obra-2');
                for(let i = 0; i < 100; i++) {
                    particles.push(new Particle());
                }
            };

            class Particle {
                constructor() {
                    this.pos = p.createVector(p.random(p.width), p.random(p.height));
                    this.vel = p.createVector(0, 0);
                    this.acc = p.createVector(0, 0);
                }

                update() {
                    this.vel.add(this.acc);
                    this.pos.add(this.vel);
                    this.acc.mult(0);
                }

                applyForce(f) {
                    this.acc.add(f);
                }

                edges() {
                    if(this.pos.x > p.width) this.pos.x = 0;
                    if(this.pos.x < 0) this.pos.x = p.width;
                    if(this.pos.y > p.height) this.pos.y = 0;
                    if(this.pos.y < 0) this.pos.y = p.height;
                }

                show() {
                    p.stroke(0, 243, 255, 50);
                    p.point(this.pos.x, this.pos.y);
                }
            }

            p.draw = () => {
                p.background(10, 15);
                particles.forEach(particle => {
                    let angle = p.noise(particle.pos.x * 0.01, particle.pos.y * 0.01) * p.TWO_PI;
                    let force = p5.Vector.fromAngle(angle);
                    force.setMag(0.1);
                    particle.applyForce(force);
                    particle.update();
                    particle.edges();
                    particle.show();
                });
            };
        }, 'obra-2');
    </script>

</body>
</html>
